name: drishti

networks:
  drishti_network:
    driver: bridge

volumes:
  redpanda-data: null

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: drishti-redpanda
    command:
      - redpanda
      - start
      - --mode dev-container
      - --smp 1
      - --memory 1G
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://192.168.1.176:19092
      - --schema-registry-addr http://0.0.0.0:8081
    ports:
      - "19092:19092"
      - "8081:8081"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      - drishti_network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 15s
      retries: 10
  
  vector:
    image: timberio/vector:latest-alpine
    container_name: drishti-vector
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
    command: ["--config", "/etc/vector/vector.toml"]
    networks:
      - drishti_network
    depends_on:
      redpanda:
        condition: service_healthy

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: drishti-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml && /app/console'
    ports:
      - "8080:8080"
    networks:
      - drishti_network
    depends_on:
      redpanda:
        condition: service_healthy